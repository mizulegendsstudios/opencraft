<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mizu Online - Prueba de Conexión</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #0f172a; 
            color: #f8fafc; 
        }
        h1 { margin-bottom: 5px; font-size: 1.8rem; color: #38bdf8; }
        #status { margin-bottom: 20px; font-weight: 500; color: #94a3b8; height: 1.5rem; }
        
        .board { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px; 
            width: 90vw; 
            max-width: 320px; 
            aspect-ratio: 1; 
        }
        
        .cell { 
            background-color: #1e293b; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 3.5rem; 
            font-weight: 800; 
            cursor: pointer; 
            user-select: none; 
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        
        .cell:hover { background-color: #334155; transform: translateY(-2px); }
        .cell.x { color: #38bdf8; } /* Azul Mizu */
        .cell.o { color: #f43f5e; } /* Rojo Competitivo */
        
        #resetBtn { 
            margin-top: 40px; 
            padding: 12px 24px; 
            font-size: 1rem; 
            font-weight: 600;
            cursor: pointer; 
            background-color: #10b981; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            transition: background 0.2s; 
        }
        
        #resetBtn:hover { background-color: #059669; }
    </style>
</head>
<body>

    <h1>Tic Tac Toe Online</h1>
    <div id="status">Conectando a la nube...</div>

    <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <button id="resetBtn">Reiniciar Partida</button>

    <script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
        }
    }
    </script>

    <script type="module">
        import { initializeApp } from 'firebase/app';
        import { getDatabase, ref, set, onValue } from 'firebase/database';

        // CONFIGURACIÓN USANDO TU URL
        const firebaseConfig = {
            databaseURL: "https://faketime-ab4fb-default-rtdb.firebaseio.com/" 
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const gameRef = ref(db, 'mizu_game'); 

        let gameState = {
            board: Array(9).fill(""),
            currentPlayer: "X",
            winner: null
        };

        const cells = document.querySelectorAll('.cell');
        const statusDisplay = document.getElementById('status');
        const resetBtn = document.getElementById('resetBtn');

        // Escuchar cambios de otros jugadores
        onValue(gameRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) {
                resetGameCloud();
                return;
            }
            gameState = data;
            updateUI();
        });

        function updateUI() {
            cells.forEach((cell, index) => {
                const value = gameState.board[index];
                cell.textContent = value;
                cell.className = `cell ${value.toLowerCase()}`;
            });

            if (gameState.winner === "draw") {
                statusDisplay.textContent = "¡Es un empate!";
            } else if (gameState.winner) {
                statusDisplay.textContent = `¡El jugador ${gameState.winner} ha ganado!`;
            } else {
                statusDisplay.textContent = `Turno actual: ${gameState.currentPlayer}`;
            }
        }

        cells.forEach(cell => {
            cell.addEventListener('click', () => {
                const index = cell.getAttribute('data-index');

                if (gameState.board[index] !== "" || gameState.winner) return;

                // Actualizar tablero
                gameState.board[index] = gameState.currentPlayer;
                
                // Lógica de victoria
                if (checkWinner()) {
                    gameState.winner = gameState.currentPlayer;
                } else if (!gameState.board.includes("")) {
                    gameState.winner = "draw";
                } else {
                    gameState.currentPlayer = gameState.currentPlayer === "X" ? "O" : "X";
                }

                // Sincronizar con Firebase
                set(gameRef, gameState);
            });
        });

        function checkWinner() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return wins.some(comb => {
                const [a, b, c] = comb;
                return gameState.board[a] && gameState.board[a] === gameState.board[b] && gameState.board[a] === gameState.board[c];
            });
        }

        resetBtn.addEventListener('click', resetGameCloud);

        function resetGameCloud() {
            set(gameRef, {
                board: Array(9).fill(""),
                currentPlayer: "X",
                winner: null
            });
        }
    </script>
</body>
</html>
