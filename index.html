<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mizu MOBA - Identity Lab</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { display: grid; grid-template-columns: 1fr 300px; gap: 20px; width: 100%; max-width: 900px; }
        
        /* Login Overlay */
        #login-screen { position: fixed; inset: 0; background: #0f172a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        input { padding: 10px; border-radius: 5px; border: none; margin: 10px; width: 200px; }
        
        /* Player & Inventory */
        .card { background: #1e293b; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid #38bdf8; }
        .inventory-item { display: inline-block; background: #334155; padding: 4px 8px; border-radius: 4px; margin: 2px; font-size: 0.8rem; }
        
        /* Chat */
        #chat-box { background: #1e293b; height: 300px; border-radius: 10px; display: flex; flex-direction: column; }
        #messages { flex-grow: 1; overflow-y: auto; padding: 10px; font-size: 0.9rem; }
        #chat-input { background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 0 0 10px 10px; }
        
        .msg { margin-bottom: 5px; }
        .msg b { color: #38bdf8; }
        
        button { cursor: pointer; background: #38bdf8; border: none; padding: 10px; border-radius: 5px; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>Mizu Identity System</h1>
        <input type="text" id="username-input" placeholder="Tu nombre de usuario...">
        <button id="start-btn">Entrar al Mundo</button>
    </div>

    <h1>Mizu Online: Session 1</h1>

    <div class="container">
        <div id="world-section">
            <h3>Jugadores Online</h3>
            <div id="players-list"></div>
            <button id="add-item-btn" style="margin-top: 20px; background: #10b981;">Añadir "Madera" al Inventario</button>
        </div>

        <div id="chat-section">
            <h3>Chat de Equipo</h3>
            <div id="chat-box">
                <div id="messages"></div>
                <input type="text" id="chat-input" placeholder="Escribe un mensaje...">
            </div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
        }
    }
    </script>

    <script type="module">
        import { initializeApp } from 'firebase/app';
        import { getDatabase, ref, set, onValue, push, serverTimestamp, onDisconnect } from 'firebase/database';

        const firebaseConfig = { databaseURL: "https://faketime-ab4fb-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myId = null;
        let myUsername = "";

        // --- LÓGICA DE IDENTIDAD ---
        document.getElementById('start-btn').onclick = () => {
            myUsername = document.getElementById('username-input').value || "Aprendiz_" + Math.floor(Math.random()*100);
            myId = "uid_" + Date.now(); // ID único basado en tiempo
            
            // Crear mi jugador en la nube
            const myRef = ref(db, 'players/' + myId);
            set(myRef, {
                username: myUsername,
                inventory: ["Poción Inicial"],
                lastSeen: serverTimestamp()
            });

            // Si cierro la pestaña, borrarme de la lista (Auto-limpieza)
            onDisconnect(myRef).remove();

            document.getElementById('login-screen').classList.add('hidden');
        };

        // --- LÓGICA DE JUGADORES e INVENTARIO ---
        onValue(ref(db, 'players'), (snapshot) => {
            const players = snapshot.val();
            const listDiv = document.getElementById('players-list');
            listDiv.innerHTML = "";
            
            for(let id in players) {
                const p = players[id];
                const invHtml = p.inventory ? p.inventory.map(item => `<span class="inventory-item">${item}</span>`).join('') : '';
                listDiv.innerHTML += `
                    <div class="card">
                        <b>${p.username}</b> ${id === myId ? '(Tú)' : ''}
                        <div style="margin-top:5px;">${invHtml}</div>
                    </div>
                `;
            }
        });

        // Modificar Inventario (Simular recoger madera para el puente)
        document.getElementById('add-item-btn').onclick = () => {
            if(!myId) return;
            const myInventoryRef = ref(db, `players/${myId}/inventory`);
            // Obtenemos el inventario actual para añadirle algo
            onValue(myInventoryRef, (snap) => {
                const current = snap.val() || [];
                if(!current.includes("Madera")) { // Evitar duplicados en este ejemplo
                    set(myInventoryRef, [...current, "Madera"]);
                }
            }, { onlyOnce: true });
        };

        // --- LÓGICA DE CHAT ---
        const chatInput = document.getElementById('chat-input');
        chatInput.onkeypress = (e) => {
            if(e.key === 'Enter' && chatInput.value !== "") {
                const chatRef = ref(db, 'messages');
                push(chatRef, {
                    user: myUsername,
                    text: chatInput.value,
                    time: serverTimestamp()
                });
                chatInput.value = "";
            }
        };

        onValue(ref(db, 'messages'), (snapshot) => {
            const msgs = snapshot.val();
            const msgDiv = document.getElementById('messages');
            msgDiv.innerHTML = "";
            for(let id in msgs) {
                const m = msgs[id];
                msgDiv.innerHTML += `<div class="msg"><b>${m.user}:</b> ${m.text}</div>`;
            }
            msgDiv.scrollTop = msgDiv.scrollHeight;
        });

    </script>
</body>
</html>
