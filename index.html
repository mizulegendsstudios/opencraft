<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Equis Cero Online</title>
  <style>
    table { border-collapse: collapse; margin: 20px auto; }
    td { width: 60px; height: 60px; text-align: center; font-size: 2em; border: 1px solid #000; cursor: pointer; }
  </style>
</head>
<body>
<h2 style="text-align:center">Juego Equis Cero</h2>
<table id="tablero"></table>

<script>
const url = "https://jsonhosting.com/api/json/cc684825"; 
let ultimoEstado = null;

// Renderizar tablero
function render(tablero) {
  const table = document.getElementById("tablero");
  table.innerHTML = "";
  tablero.forEach((fila, i) => {
    const tr = document.createElement("tr");
    fila.forEach((celda, j) => {
      const td = document.createElement("td");
      td.textContent = celda;
      td.onclick = () => jugar(i, j);
      tr.appendChild(td);
    });
    table.appendChild(tr);
  });
}

// Obtener estado del servidor
async function getEstado() {
  try {
    const res = await fetch(url, { cache: "no-store" });
    const data = await res.json();

    if (JSON.stringify(data) !== JSON.stringify(ultimoEstado)) {
      render(data.tablero);
      turno = data.turno;
      ultimoEstado = data;
    }
  } catch (err) {
    console.error("Error al obtener estado:", err);
  }
}
let turno = "X";

// Jugar
async function jugar(i, j) {
  try {
    const res = await fetch(url, { cache: "no-store" });
    const data = await res.json();

    if (data.tablero[i][j] === "") {
      data.tablero[i][j] = data.turno;
      data.turno = (data.turno === "X") ? "O" : "X";

      await fetch(url, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });
      getEstado();
    }
  } catch (err) {
    console.error("Error al jugar:", err);
  }
}

// Actualizar cada 150 ms (~6 veces por segundo)
setInterval(getEstado, 150);
getEstado();
</script>
</body>
</html>
